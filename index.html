<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="TrainTrack — Mumbai Local Train Tracker. Real-time departures, delays and platforms for Western, Central and Harbour lines." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TrainTrack" />

  <title>TrainTrack — Mumbai Local</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

  <meta name="theme-color" content="#E55934" />

  <!-- Amber Dawn styles -->
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- NEW HOME STRUCTURE -->
  <div class="home-container">
    <header class="home-header">
      <h1 id="greeting">Good evening, Traveler</h1>
      <div class="header-actions">
        <button class="icon-btn" aria-label="Search">🔍</button>
        <button class="icon-btn" aria-label="Settings">⚙️</button>
      </div>
    </header>

    <section class="next-train-card" id="nextTrainCard">
      <!-- Dynamically populated by JS -->
    </section>

    <section class="saved-journeys" id="savedJourneys">
      <h3>Saved Journeys</h3>
      <div class="journey-list">
        <!-- Dynamically populated -->
        <button class="journey-badge">
           <span>VR → CCG</span>
           <span class="arrow">→</span>
        </button>
        <button class="journey-badge">
           <span>BVI → ADH</span>
           <span class="arrow">→</span>
        </button>
      </div>
    </section>

    <section class="next-trains" id="nextTrains">
      <h3>Next Trains</h3>
      <div class="train-list" id="trainList">
        <!-- Dynamically populated -->
      </div>
    </section>

    <nav class="bottom-nav">
      <button class="nav-item active" data-view="home">
        <span class="icon">🏠</span>
        <span class="label">Home</span>
      </button>
      <button class="nav-item" data-view="alerts">
        <span class="icon">🔔</span>
        <span class="label">Alerts</span>
      </button>
      <button class="nav-item" data-view="settings">
        <span class="icon">⚙️</span>
        <span class="label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- Journey Tracker View (hidden by default) -->
  <div class="journey-tracker-container" id="journeyTracker" style="display: none;">
    <!-- Populated by journeyTracker.js -->
  </div>

  <!-- ES6 MODULE IMPORT -->
  <script type="module" src="/js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
