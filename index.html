<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="TrainTrack — Mumbai Local Train Tracker. Real-time departures, delays and platforms for Western, Central and Harbour lines." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TrainTrack" />

  <title>TrainTrack — Mumbai Local</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://railradar.in https://traintrack-proxy.oshwetank.workers.dev; img-src 'self' data: https:; frame-ancestors 'none';" />

  <!-- Transit Flow fonts: Outfit (headings) + Be Vietnam Pro (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" />

  <!-- PWA Manifest (relative path — works at root and on GitHub Pages) -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <meta name="theme-color" content="#E55934" />

  <!-- Amber Dawn styles -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- HOME VIEW -->
  <div class="home-container">
    <header class="home-header">
      <h1 id="greeting">Good evening, Traveler</h1>
      <div class="header-actions">
        <button class="icon-btn" type="button" id="btnHeaderSearch" aria-label="Search">Search</button>
        <button class="icon-btn" type="button" aria-label="Settings">Settings</button>
      </div>
    </header>

    <nav class="line-tabs" aria-label="Railway line">
      <button class="line-tab tab-western active" type="button" data-line="western" aria-current="page">Western</button>
      <button class="line-tab tab-central" type="button" data-line="central">Central</button>
      <button class="line-tab tab-harbour" type="button" data-line="harbour">Harbour</button>
      <button class="line-tab tab-trans-harbour" type="button" data-line="trans_harbour">Trans-Harbour</button>
    </nav>

    <section class="next-train-card" id="nextTrainCard" aria-label="Next train">
      <!-- Dynamically populated by JS -->
    </section>

    <section class="saved-journeys" id="savedJourneys">
      <h3>Saved Journeys</h3>
      <div class="journey-list">
        <!-- Dynamically populated -->
        <button class="journey-badge">
           <span>VR → CCG</span>
           <span class="arrow">↩</span>
        </button>
        <button class="journey-badge">
           <span>BVI → ADH</span>
           <span class="arrow">↩</span>
        </button>
      </div>
    </section>

    <section class="next-trains" id="nextTrains">
      <h3>Next Trains</h3>
      <div class="train-list" id="trainList" aria-live="polite" aria-label="Upcoming trains">
        <!-- Dynamically populated -->
      </div>
    </section>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item active" data-view="home" aria-label="Home">
        <span class="icon" aria-hidden="true">🏠</span>
        <span class="label">Home</span>
      </button>
      <button class="nav-item" data-view="alerts" aria-label="Alerts">
        <span class="icon" aria-hidden="true">🔔</span>
        <span class="label">Alerts</span>
      </button>
      <button class="nav-item" data-view="settings" aria-label="Settings">
        <span class="icon" aria-hidden="true">⚙️</span>
        <span class="label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- Search View (hidden by default) -->
  <div class="search-container" id="searchContainer" style="display: none;" aria-label="Search stations">
    <div class="search-header">
      <button class="icon-btn search-back-btn" id="btnSearchBack" aria-label="Back">Back</button>
      <div class="search-input-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search station (e.g., Andheri)" aria-label="Station name" autocomplete="off" />
        <button class="clear-search-btn" id="btnClearSearch" aria-label="Clear search" style="display: none;">×</button>
      </div>
    </div>
    <div class="search-results-viewport">
      <div class="search-results-list" id="searchResults" aria-live="polite">
        <!-- Populated by searchUI.js -->
        <div class="search-placeholder">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <p>Type to search stations</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Journey Tracker View (hidden by default) -->
  <div class="journey-tracker-container" id="journeyTracker" style="display: none;" aria-label="Journey tracker">
    <!-- Populated by journeyTracker.js -->
  </div>

  <!-- ES6 MODULE IMPORT (relative path — works at root and on GitHub Pages) -->
  <script type="module" src="./js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Relative path resolves correctly regardless of hosting base (root or /TrainTrack/)
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
