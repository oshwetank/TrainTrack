<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="TrainTrack — Mumbai Local Train Tracker. Real-time departures, delays and platforms for Western, Central and Harbour lines." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TrainTrack" />

  <title>TrainTrack — Mumbai Local</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://traintrack-proxy.oshwetank.workers.dev; img-src 'self' data: https:; frame-ancestors 'none';" />

  <!-- PWA Manifest (relative path — works at root and on GitHub Pages) -->
  <link rel="manifest" href="./manifest.json" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />

  <meta name="theme-color" content="#E55934" />

  <!-- Amber Dawn styles -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- HOME VIEW -->
  <div class="home-container">
    <header class="home-header">
      <h1 id="greeting">Good evening, Traveler</h1>
      <div class="header-actions">
        <button class="icon-btn" type="button" id="btnHeaderSearch" aria-label="Search">Search</button>
        <button class="icon-btn" type="button" aria-label="Settings">Settings</button>
      </div>
    </header>

    <nav class="line-tabs" aria-label="Railway line">
      <div class="tab-group" aria-label="Suburban lines">
        <button class="line-tab tab-western active" type="button" data-line="western" aria-current="page">Western</button>
        <button class="line-tab tab-central" type="button" data-line="central">Central</button>
        <button class="line-tab tab-harbour" type="button" data-line="harbour">Harbour</button>
        <button class="line-tab tab-trans-harbour" type="button" data-line="trans_harbour">Trans-Harbour</button>
      </div>
      <div class="tab-group tab-group-metro" aria-label="Metro lines">
        <button class="line-tab tab-metro-aqua" type="button" data-line="metro_aqua">Metro 1</button>
        <button class="line-tab tab-metro-red" type="button" data-line="metro_red">Metro 2A</button>
        <button class="line-tab tab-metro-yellow" type="button" data-line="metro_yellow">Metro 7</button>
      </div>
    </nav>

    <section class="next-train-card" id="nextTrainCard" aria-label="Next train">
      <!-- Dynamically populated by JS -->
    </section>

    <section class="saved-journeys" id="savedJourneys">
      <h3>Saved Journeys</h3>
      <div class="journey-list">
        <!-- Dynamically populated by app.js _renderSavedJourneys() -->
      </div>
    </section>

    <section class="next-trains" id="nextTrains">
      <h3>Next Trains</h3>
      <div class="train-list" id="trainList" aria-live="polite" aria-label="Upcoming trains">
        <!-- Dynamically populated -->
      </div>
    </section>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item active" data-view="home" aria-current="page" aria-label="Home">
        <svg class="icon" aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="label">Home</span>
      </button>
      <button class="nav-item" data-view="alerts" aria-label="Alerts">
        <svg class="icon" aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="label">Alerts</span>
      </button>
      <button class="nav-item" data-view="settings" aria-label="Settings">
        <svg class="icon" aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- Search View (hidden by default) -->
  <div class="search-container" id="searchContainer" style="display: none;" aria-label="Search stations">
    <div class="search-header">
      <button class="icon-btn search-back-btn" id="btnSearchBack" aria-label="Back">Back</button>
      <div class="search-input-wrapper">
        <input type="text" id="searchInput" class="search-input" placeholder="Search station (e.g., Andheri)" aria-label="Station name" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="searchResults" aria-haspopup="listbox" />
        <button class="clear-search-btn" id="btnClearSearch" aria-label="Clear search" style="display: none;">×</button>
      </div>
    </div>
    <div class="search-results-viewport">
      <div class="search-results-list" id="searchResults" role="listbox" aria-label="Station suggestions" aria-live="polite">
        <!-- Populated by searchUI.js -->
        <div class="search-placeholder">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <p>Type to search stations</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Journey Tracker View (hidden by default) -->
  <div class="journey-tracker-container" id="journeyTracker" style="display: none;" aria-label="Journey tracker">
    <!-- Populated by journeyTracker.js -->
  </div>

  <!-- Alerts View (hidden by default) -->
  <div class="secondary-view" id="alertsView" style="display: none;" aria-label="Service alerts">
    <!-- Populated by alertsView.js -->
  </div>

  <!-- Settings View (hidden by default) -->
  <div class="secondary-view" id="settingsView" style="display: none;" aria-label="Settings">
    <!-- Populated by settingsView.js -->
  </div>

  <!-- ES6 MODULE IMPORT (relative path — works at root and on GitHub Pages) -->
  <script type="module" src="./js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Relative path resolves correctly regardless of hosting base (root or /TrainTrack/)
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
